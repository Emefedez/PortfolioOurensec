<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Máquina Sencilla - MS Clon GUI Portable</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden;}
        .toolbar { background: #fff; border: 1px solid #ccc; padding: 6px 10px; border-radius: 5px; margin-bottom: 5px; display: flex; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); align-items: center; flex: none;}
        button { background: #f8f9fa; border: 1px solid #c0c0c0; padding: 5px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 13px; transition: 0.2s; }
        button:hover { background: #e2e6ea; border-color: #adb5bd; }
        .toolbar-group { display: flex; gap: 5px; border-right: 2px solid #ddd; padding-right: 10px; align-items: center;}
        .toolbar-group:last-child { border-right: none; }
        input[type="number"], input[type="text"] { width: 60px; padding: 5px; font-family: monospace; border: 1px solid #ccc; border-radius: 3px; text-align: center; }
        label { font-weight: bold; font-size: 12px; margin-right: 5px; }
        
        .workspace { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .top-section { display: flex; height: 65%; overflow: hidden; min-height: 150px; }
        
        .resizer-x { width: 6px; cursor: col-resize; background: #ddd; transition: background 0.2s; }
        .resizer-x:hover { background: #bbb; }
        .resizer-y { height: 6px; cursor: row-resize; background: #ddd; transition: background 0.2s; flex: none; }
        .resizer-y:hover { background: #bbb; }
        
        .log-panel { flex: 1; background: #1e1e1e; color: #d4d4d4; font-family: 'Courier New', Courier, monospace; font-size: 13px; overflow-y: auto; border-radius: 5px; border: 1px solid #ccc; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); white-space: pre-wrap; word-wrap: break-word; min-height: 80px;}
        
        .panel { background: #fff; border: 1px solid #ccc; border-radius: 5px; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .panel-header { background: #f1f1f1; padding: 6px 12px; font-weight: bold; border-bottom: 1px solid #ccc; margin: 0; font-size: 13px; display: flex; justify-content: space-between;}
        
        .editor-container { position: relative; flex: 1; overflow: hidden; background: #fff; }
        .editor-backdrop { position: absolute; top: 0; left: 0; right: 0; bottom: 0; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 15px; white-space: pre; overflow: hidden; color: transparent; z-index: 1; pointer-events: none;}
        .editor-textarea { position: absolute; top: 0; left: 0; right: 0; bottom: 0; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 15px; white-space: pre; border: none; outline: none; resize: none; background: transparent; color: transparent; caret-color: black; z-index: 2;}
        
        .hl-inst { color: #0000ff; font-weight: bold; }
        .hl-label { color: #800080; }
        .hl-comment { color: #008000; font-style: italic; }
        .hl-data { color: #b8860b; }
        .hl-text { color: #333; }

        .registers { display: flex; justify-content: space-around; padding: 10px; background: #fafafa; border-bottom: 1px solid #ccc; }
        .reg { font-family: 'Courier New', Courier, monospace; font-size: 18px; font-weight: bold; }
        .reg span { color: #0066cc; }
        .reg-fz span { color: #cc0000; }
        
        .memory-wrap { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 4px 8px; text-align: center; font-family: 'Courier New', Courier, monospace; font-size: 13px; }
        th { background: #f8f8f8; position: sticky; top: 0; z-index: 10; font-family: sans-serif; font-size: 12px; }
        td:nth-child(3) { text-align: left; }
        .current-inst { background: #fff3cd !important; font-weight: bold; }
        .bp-inst { background: #f8d7da !important; }
        .empty-inst { color: #aaa; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="toolbar-group">
        <button onclick="document.getElementById('file-input').click()">📂 Cargar</button>
        <input type="file" id="file-input" style="display:none" onchange="loadFile(event)" accept=".txt,.asm,.ms,.MS">
        <button onclick="saveFileTxt()">💾 .TXT</button>
        <button onclick="saveFileTxtClean()">📄 Limpio</button>
        <button onclick="saveFileMS()" style="background: #e3f2fd; border-color: #b6d4fe;">💾 Exportar .MS</button>
    </div>
    <div class="toolbar-group">
        <button onclick="assemble()" style="background: #d1e7dd; border-color: #a3cfbb;">⚙️ Ensamblar</button>
        <button onclick="step()" id="btn-step">👣 Paso</button>
        <button onclick="run()" id="btn-run">▶️ GO</button>
        <button onclick="stopRun()" id="btn-stop" style="display:none; background: #f8d7da; border-color: #dc3545;">🛑 Parar</button>
        <button onclick="reset()">🔄 Reset</button>
    </div>
    <div class="toolbar-group">
        <label>PC:</label>
        <input type="number" id="inp-pc" value="0" min="0" max="127" onchange="updatePCFromInput()">
        <label style="margin-left: 8px; color: #dc3545;">BP:</label>
        <input type="number" id="inp-bp" value="-1" min="-1" max="127" onchange="updateBP()">
    </div>
</div>

<div class="workspace">
    <div class="top-section" id="top-section">
        <div class="panel" id="left-panel" style="width: 45%;">
            <div class="panel-header">EDITOR</div>
            <div class="editor-container">
                <div id="editor-backdrop" class="editor-backdrop"></div>
                <textarea id="editor" class="editor-textarea" spellcheck="false" oninput="handleEditorInput()" onscroll="handleEditorScroll()">UNO: 1
CERO: 0

If: 1
RESULT: 1

NUM: 5 
M: 3

INICIO:
MOV UNO, If
MOV UNO, R
ADD UNO, NUM

SIGUEn: 
MOV R, RESULT
CMP If, NUM
BEQ SALIRm

MOV RESULT, NUM1 
MOV If, NUM2
ADD UNO, If
MOV RET1, FINM
CMP CERO, CERO
BEQ INIMUL

SALIRm:
MOV RESULT, NUM1
MOV M, NUM2
MOV FIN, FINM
BEQ INIMUL

I: 3
R: 0
NUM1: 2
NUM2: 3

INIMUL:
MOV CERO, R
MOV CERO, I

BUCMUL:
CMP I, NUM2
BEQ FINM
ADD NUM1, R
ADD UNO, I
CMP CERO, CERO
BEQ BUCMUL

FINM: BEQ SIGUEn
RET1: BEQ SIGUEn

FIN: 
MOV R, RESULT
MOV RESULT, NUM
FINFIN: BEQ FINFIN</textarea>
            </div>
        </div>
        
        <div class="resizer-x" id="drag-x"></div>
        
        <div class="panel" id="right-panel" style="flex: 1;">
            <div class="panel-header">ESTADO (HEX/DEC)</div>
            <div class="registers">
                <div class="reg">PC: <span id="reg-pc">0</span></div>
                <div class="reg reg-fz">FZ: <span id="reg-fz">0</span></div>
            </div>
            <div class="memory-wrap">
                <table id="mem-table">
                    <thead>
                        <tr>
                            <th width="40">Dir</th>
                            <th width="120">Valor</th>
                            <th>Mnemónico / Instrucción</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="resizer-y" id="drag-y"></div>

    <div class="log-panel" id="log-panel">
        <div style="font-weight: bold; margin-bottom: 5px; color: #fff;">[LOG DE EJECUCIÓN]</div>
        <div id="log-content"></div>
    </div>
</div>

<script>
    // --- RESIZER ---
    let isDraggingX = false, isDraggingY = false;
    document.getElementById('drag-x').onmousedown = (e) => { isDraggingX = true; e.preventDefault(); };
    document.getElementById('drag-y').onmousedown = (e) => { isDraggingY = true; e.preventDefault(); };
    document.onmousemove = (e) => {
        if (isDraggingX) document.getElementById('left-panel').style.width = e.clientX + 'px';
        if (isDraggingY) document.getElementById('top-section').style.height = (e.clientY - 45) + 'px';
    };
    document.onmouseup = () => { isDraggingX = isDraggingY = false; };

    // --- EMULATOR ---
    const MEM_SIZE = 128;
    let mem = new Array(MEM_SIZE).fill(0), mnemonics = new Array(MEM_SIZE).fill(''), types = new Array(MEM_SIZE).fill(0);
    let pc = 0, breakpoint = -1, fz = false, halted = false, isRunning = false;
    let currentLabels = {}, reverseLabels = {};

    function toSigned(val) { return val >= 0x8000 ? val - 0x10000 : val; }
    function getDisp(val) { return `${val.toString(16).toUpperCase().padStart(4, '0')} (${toSigned(val)})`; }

    function logTrace(msg) {
        let content = document.getElementById('log-content');
        let div = document.createElement('div');
        div.innerText = msg;
        content.appendChild(div);
        content.parentNode.scrollTop = content.parentNode.scrollHeight;
    }

    function handleEditorInput() {
        let text = document.getElementById('editor').value;
        document.getElementById('editor-backdrop').innerHTML = applyHighlights(text);
    }
    function handleEditorScroll() {
        let e = document.getElementById('editor');
        let b = document.getElementById('editor-backdrop');
        b.scrollTop = e.scrollTop; b.scrollLeft = e.scrollLeft;
    }

    function applyHighlights(text) {
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').split('\n').map(line => {
            let commentIdx = line.indexOf(';');
            let comment = commentIdx !== -1 ? line.substring(commentIdx) : "";
            line = commentIdx !== -1 ? line.substring(0, commentIdx) : line;
            let labelIdx = line.indexOf(':');
            let label = labelIdx !== -1 ? line.substring(0, labelIdx + 1) : "";
            line = labelIdx !== -1 ? line.substring(labelIdx + 1) : line;
            let highlighted = line.split(/(\s+|,)/).map(w => {
                if (w === ',' || w.trim() === '') return `<span class="hl-text">${w}</span>`;
                let u = w.toUpperCase();
                if (['ADD','CMP','MOV','BEQ','HALT','STOP','DATA'].includes(u)) return `<span class="hl-inst">${w}</span>`;
                if (/^[0-9A-F]{1,4}$/.test(u)) return `<span class="hl-data">${w}</span>`;
                return `<span class="hl-text">${w}</span>`;
            }).join('');
            return (label ? `<span class="hl-label">${label}</span>` : "") + highlighted + (comment ? `<span class="hl-comment">${comment}</span>` : "");
        }).join('\n') + '\n';
    }

    function assemble() {
        stopRun(); mem.fill(0); mnemonics.fill(''); types.fill(0); currentLabels = {}; reverseLabels = {};
        let text = document.getElementById('editor').value, lines = text.split('\n'), parsed = [], addr = 2; // Start at 2 for MS compat
        for (let raw of lines) {
            let line = raw.split(';')[0].trim();
            if (!line) continue;
            if (line.includes(':')) {
                let parts = line.split(':');
                currentLabels[parts[0].trim().toUpperCase()] = addr;
                line = parts.slice(1).join(':').trim();
            }
            if (line) { parsed.push({addr, line}); addr++; }
        }
        for (let p of parsed) {
            mnemonics[p.addr] = p.line;
            let parts = p.line.toUpperCase().replace(/,/g, ' ').split(/\s+/).filter(x => x);
            let cmd = parts[0];
            let getV = (s) => currentLabels[s] || (/[A-F]/i.test(s) ? parseInt(s, 16) : parseInt(s, 10));
            try {
                if (cmd === 'DATA') { mem[p.addr] = getV(parts[1]) & 0xFFFF; types[p.addr] = 2; }
                else if (['ADD','CMP','MOV'].includes(cmd)) {
                    let op = {'ADD':0,'CMP':1,'MOV':2}[cmd];
                    mem[p.addr] = (op << 14) | ((getV(parts[1]) & 0x7F) << 7) | (getV(parts[2]) & 0x7F);
                    types[p.addr] = 1;
                } else if (cmd === 'BEQ') { mem[p.addr] = (3 << 14) | (getV(parts[1]) & 0x7F); types[p.addr] = 1; }
                else if (cmd === 'HALT' || cmd === 'STOP') { mem[p.addr] = 0xFFFF; types[p.addr] = 1; }
                else if (/^[0-9A-F]{1,4}$/.test(cmd)) { mem[p.addr] = parseInt(cmd, 16) & 0xFFFF; types[p.addr] = 2; }
            } catch(e) {}
        }
        for(let k in currentLabels) reverseLabels[currentLabels[k]] = k;
        pc = currentLabels['INICIO'] || 2;
        document.getElementById('inp-pc').value = pc;
        document.getElementById('log-content').innerHTML = '';
        logTrace("✓ Ensamblado. PC inicial: " + pc);
        updateView();
    }

    function step() {
        if (halted || pc >= MEM_SIZE) return false;
        let inst = mem[pc], cur_pc = pc, mnem = mnemonics[pc], lbl = reverseLabels[pc] ? `[${reverseLabels[pc]}] ` : `[] `;
        if (inst === 0xFFFF || (inst === 0 && !mnem)) { halted = true; logTrace(`[HALT] Fin en PC=${pc}`); return false; }
        let op = (inst >> 14) & 3, f = (inst >> 7) & 0x7F, d = inst & 0x7F;
        pc++;
        if (op === 0) { mem[d] = (mem[d] + mem[f]) & 0xFFFF; }
        else if (op === 1) { fz = (mem[f] === mem[d]); }
        else if (op === 2) { mem[d] = mem[f]; }
        else if (op === 3 && fz) { pc = d; }
        
        // Auto-update instructions if modified (Self-modifying code support)
        if ((op === 0 || op === 2) && types[d] === 1) {
            let ni = mem[d], nop = (ni >> 14) & 3, nf = (ni >> 7) & 0x7F, nd = ni & 0x7F;
            mnemonics[d] = (ni === 0xFFFF) ? "HALT" : (["ADD","CMP","MOV","BEQ"][nop] + (nop===3?` ${nd}`:` ${nf}, ${nd}`));
        } else if ((op === 0 || op === 2) && types[d] !== 1) {
            mnemonics[d] = mem[d].toString(16).toUpperCase().padStart(4, '0');
        }

        let state = `${lbl}${mnem} -> FZ=${fz?1:0}`;
        for(let k in currentLabels) if(types[currentLabels[k]] === 2) state += `, ${k}=${getDisp(mem[currentLabels[k]])}`;
        logTrace(state);
        document.getElementById('inp-pc').value = pc;
        if (!isRunning) updateView();
        return true;
    }

    async function run() {
        if (isRunning || halted) return; isRunning = true;
        document.getElementById('btn-run').style.display = 'none'; document.getElementById('btn-stop').style.display = 'inline-block';
        let steps = 0;
        while (isRunning && !halted && pc < MEM_SIZE && steps < 5000) {
            if (pc === breakpoint && steps > 0) break;
            if (!step()) break;
            if (pc === breakpoint) { updateView(); break; }
            if (++steps % 10 === 0) { updateView(); await new Promise(r => setTimeout(r, 10)); }
        }
        stopRun();
    }
    function stopRun() { isRunning = false; document.getElementById('btn-run').style.display = 'inline-block'; document.getElementById('btn-stop').style.display = 'none'; updateView(); }
    function reset() { assemble(); }
    function updatePCFromInput() { pc = parseInt(document.getElementById('inp-pc').value) || 0; updateView(); }
    function updateBP() { breakpoint = parseInt(document.getElementById('inp-bp').value); updateView(); }

    function updateView() {
        document.getElementById('reg-pc').innerText = pc; document.getElementById('reg-fz').innerText = fz?1:0;
        let tbody = document.querySelector('#mem-table tbody'); tbody.innerHTML = '';
        for (let i = 0; i < MEM_SIZE; i++) {
            let tr = document.createElement('tr');
            if (i === pc) tr.className = 'current-inst'; else if (i === breakpoint) tr.className = 'bp-inst'; else if (!mnemonics[i]) tr.className = 'empty-inst';
            let dispVal = (i < 2) ? mem[i] : (types[i] === 2 ? getDisp(mem[i]) : mem[i].toString(16).toUpperCase().padStart(4, '0'));
            tr.innerHTML = `<td>${i}</td><td>${dispVal}</td><td>${reverseLabels[i] ? `<b>${reverseLabels[i]}:</b> ` : ""}${mnemonics[i]}</td>`;
            tbody.appendChild(tr);
            if (i === pc && pc > 0) tr.scrollIntoView({ block: 'center' });
        }
    }

    function loadFile(event) {
        let f = event.target.files[0]; if (!f) return;
        let r = new FileReader();
        if (f.name.toUpperCase().endsWith('.MS')) {
            r.onload = (e) => { let b = new Uint8Array(e.target.result); document.getElementById('editor').value = decompile(b); handleEditorInput(); assemble(); };
            r.readAsArrayBuffer(f);
        } else {
            r.onload = (e) => { document.getElementById('editor').value = e.target.result; handleEditorInput(); assemble(); };
            r.readAsText(f);
        }
    }

    function decompile(buf) {
        let numL = buf[0] | (buf[1] << 8), fileMem = [], fileTypes = [], fileLabels = {};
        for(let i=0; i<128; i++) fileMem[i] = buf[4+(i*2)] | (buf[4+(i*2)+1] << 8);
        for(let i=0; i<128; i++) fileTypes[i] = buf[260+i];
        let nameOff = 388, posOff = nameOff + (numL * 7);
        for(let i=0; i<numL; i++) {
            let pos = buf[posOff+(i*2)] | (buf[posOff+(i*2)+1] << 8), name = "";
            for(let c=0; c<6; c++) { let ch = buf[nameOff+(i*7)+c]; if(!ch) break; name += String.fromCharCode(ch); }
            fileLabels[pos] = name;
        }
        let text = "; Decompilado\n";
        for(let i=2; i<128; i++) {
            if (!fileTypes[i] && !fileLabels[i]) continue;
            let line = fileLabels[i] ? fileLabels[i] + ": " : "";
            if (fileTypes[i] === 2) line += "DATA " + fileMem[i].toString(16).toUpperCase().padStart(4, '0');
            else if (fileTypes[i] === 1) {
                let v = fileMem[i]; if(v===0xFFFF) line+="HALT"; else {
                    let op = (v>>14)&3, f = (v>>7)&0x7F, d = v&0x7F;
                    line += ["ADD","CMP","MOV","BEQ"][op] + (op===3 ? ` ${fileLabels[d]||d}` : ` ${fileLabels[f]||f}, ${fileLabels[d]||d}`);
                }
            }
            text += line + "\n";
        }
        return text;
    }

    function saveFileMS() {
        let active = []; for(let i=0; i<MEM_SIZE; i++) if(reverseLabels[i]) active.push({n:reverseLabels[i], p:i});
        let buf = new Uint8Array(388 + active.length * 9);
        buf[0] = active.length & 0xFF; buf[1] = (active.length >> 8) & 0xFF;
        for(let i=0; i<MEM_SIZE; i++) { 
            let v = (i===0) ? active.length : (i===1 ? 0 : mem[i]);
            buf[4+i*2] = v & 0xFF; buf[4+i*2+1] = (v >> 8) & 0xFF; 
            buf[260+i] = types[i];
        }
        active.forEach((l, i) => {
            for(let c=0; c<Math.min(l.n.length, 6); c++) buf[388+i*7+c] = l.n.charCodeAt(c);
            let pOff = 388 + active.length*7 + i*2; buf[pOff] = l.p & 0xFF; buf[pOff+1] = (l.p >> 8) & 0xFF;
        });
        let a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([buf])); a.download = "PROG.MS"; a.click();
    }

    function saveFileTxt() { let a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([document.getElementById('editor').value])); a.download = "codigo.txt"; a.click(); }
    function saveFileTxtClean() { 
        let clean = document.getElementById('editor').value.split('\n').map(l => l.split(';')[0].trim()).filter(l => l).join('\n');
        let a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([clean])); a.download = "limpio.txt"; a.click(); 
    }

    handleEditorInput(); assemble();
</script>
</body>
</html>
